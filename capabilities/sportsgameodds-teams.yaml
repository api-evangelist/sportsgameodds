naftiko: 1.0.0-alpha2
info:
  label: SportsGameOdds API — Teams
  description: 'SportsGameOdds API — Teams. 2 operations. Lead operation: List Teams. Self-contained Naftiko capability covering
    one Sportsgameodds business surface.'
  tags:
  - Sportsgameodds
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPORTSGAMEODDS_API_KEY: SPORTSGAMEODDS_API_KEY
capability:
  consumes:
  - type: http
    namespace: sportsgameodds-teams
    baseUri: https://api.sportsgameodds.com/v1
    description: SportsGameOdds API — Teams business capability. Self-contained, no shared references.
    resources:
    - name: teams
      path: /teams/
      operations:
      - name: listteams
        method: GET
        description: List Teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sport
          in: query
          type: string
          description: Filter by sport
        - name: league
          in: query
          type: string
          description: Filter by league
    - name: teams-teamId
      path: /teams/{teamId}
      operations:
      - name: getteam
        method: GET
        description: Get Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: teamId
          in: path
          type: string
          description: Unique team identifier
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.SPORTSGAMEODDS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: sportsgameodds-teams-rest
    port: 8080
    description: REST adapter for SportsGameOdds API — Teams. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/teams
      name: teams
      description: REST surface for teams.
      operations:
      - method: GET
        name: listteams
        description: List Teams
        call: sportsgameodds-teams.listteams
        with:
          sport: rest.sport
          league: rest.league
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/teams/{teamid}
      name: teams-teamid
      description: REST surface for teams-teamId.
      operations:
      - method: GET
        name: getteam
        description: Get Team
        call: sportsgameodds-teams.getteam
        with:
          teamId: rest.teamId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sportsgameodds-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for SportsGameOdds API — Teams. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-teams
      description: List Teams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sportsgameodds-teams.listteams
      with:
        sport: tools.sport
        league: tools.league
      outputParameters:
      - type: object
        mapping: $.
    - name: get-team
      description: Get Team
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sportsgameodds-teams.getteam
      with:
        teamId: tools.teamId
      outputParameters:
      - type: object
        mapping: $.
