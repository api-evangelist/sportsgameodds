naftiko: 1.0.0-alpha2
info:
  label: SportsGameOdds API — Events
  description: 'SportsGameOdds API — Events. 2 operations. Lead operation: List Events. Self-contained Naftiko capability
    covering one Sportsgameodds business surface.'
  tags:
  - Sportsgameodds
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPORTSGAMEODDS_API_KEY: SPORTSGAMEODDS_API_KEY
capability:
  consumes:
  - type: http
    namespace: sportsgameodds-events
    baseUri: https://api.sportsgameodds.com/v1
    description: SportsGameOdds API — Events business capability. Self-contained, no shared references.
    resources:
    - name: events
      path: /events/
      operations:
      - name: listevents
        method: GET
        description: List Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sport
          in: query
          type: string
          description: Filter by sport (e.g., football, basketball, baseball)
        - name: league
          in: query
          type: string
          description: Filter by league (e.g., NFL, NBA, EPL)
        - name: status
          in: query
          type: string
          description: Filter by event status
        - name: dateFrom
          in: query
          type: string
          description: Start date filter (ISO 8601 format)
        - name: dateTo
          in: query
          type: string
          description: End date filter (ISO 8601 format)
        - name: limit
          in: query
          type: integer
          description: Maximum number of results to return
    - name: events-eventId
      path: /events/{eventId}
      operations:
      - name: getevent
        method: GET
        description: Get Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: eventId
          in: path
          type: string
          description: Unique event identifier
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.SPORTSGAMEODDS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: sportsgameodds-events-rest
    port: 8080
    description: REST adapter for SportsGameOdds API — Events. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/events
      name: events
      description: REST surface for events.
      operations:
      - method: GET
        name: listevents
        description: List Events
        call: sportsgameodds-events.listevents
        with:
          sport: rest.sport
          league: rest.league
          status: rest.status
          dateFrom: rest.dateFrom
          dateTo: rest.dateTo
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events/{eventid}
      name: events-eventid
      description: REST surface for events-eventId.
      operations:
      - method: GET
        name: getevent
        description: Get Event
        call: sportsgameodds-events.getevent
        with:
          eventId: rest.eventId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sportsgameodds-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for SportsGameOdds API — Events. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-events
      description: List Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sportsgameodds-events.listevents
      with:
        sport: tools.sport
        league: tools.league
        status: tools.status
        dateFrom: tools.dateFrom
        dateTo: tools.dateTo
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-event
      description: Get Event
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sportsgameodds-events.getevent
      with:
        eventId: tools.eventId
      outputParameters:
      - type: object
        mapping: $.
