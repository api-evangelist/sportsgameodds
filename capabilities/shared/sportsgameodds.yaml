naftiko: "1.0.0-alpha1"

info:
  label: "SportsGameOdds API"
  description: >-
    Real-time sports betting odds API from 80+ sportsbooks across 50+ leagues.
    Covers NFL, NBA, MLB, NHL, NCAAF, NCAAB, EPL, UCL, UFC, PGA, and ATP with
    3,000+ betting markets including moneylines, spreads, totals, team props, and player props.
  tags:
    - Sports Betting
    - Odds
    - Real-Time Data
    - Sports Data
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPORTSGAMEODDS_API_KEY: SPORTSGAMEODDS_API_KEY

capability:
  consumes:
    - type: http
      namespace: sportsgameodds
      baseUri: https://api.sportsgameodds.com/v1
      description: "SportsGameOdds REST API for real-time sports betting odds data"
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{SPORTSGAMEODDS_API_KEY}}"
        placement: header
      resources:
        - name: events
          path: /events/
          description: "Sporting events with live odds from multiple sportsbooks"
          operations:
            - name: list-events
              method: GET
              description: "List sporting events with optional sport, league, status, and date filters"
              inputParameters:
                - name: sport
                  in: query
                  type: string
                  required: false
                  description: "Sport filter (football, basketball, baseball, hockey, soccer)"
                - name: league
                  in: query
                  type: string
                  required: false
                  description: "League filter (NFL, NBA, MLB, NHL, EPL, etc.)"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Event status filter (scheduled, live, completed)"
                - name: dateFrom
                  in: query
                  type: string
                  required: false
                  description: "Start date filter (ISO 8601 date)"
                - name: dateTo
                  in: query
                  type: string
                  required: false
                  description: "End date filter (ISO 8601 date)"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return (max 500)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-event
              method: GET
              description: "Get a specific sporting event by ID with odds and scores"
              inputParameters:
                - name: eventId
                  in: path
                  type: string
                  required: true
                  description: "Unique event identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: teams
          path: /teams/
          description: "Sports teams data"
          operations:
            - name: list-teams
              method: GET
              description: "List teams with optional sport and league filters"
              inputParameters:
                - name: sport
                  in: query
                  type: string
                  required: false
                  description: "Filter by sport"
                - name: league
                  in: query
                  type: string
                  required: false
                  description: "Filter by league"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-team
              method: GET
              description: "Get a specific team by ID"
              inputParameters:
                - name: teamId
                  in: path
                  type: string
                  required: true
                  description: "Unique team identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: players
          path: /players/
          description: "Sports players data including props odds"
          operations:
            - name: list-players
              method: GET
              description: "List players with optional team, sport, and league filters"
              inputParameters:
                - name: teamId
                  in: query
                  type: string
                  required: false
                  description: "Filter by team ID"
                - name: sport
                  in: query
                  type: string
                  required: false
                  description: "Filter by sport"
                - name: league
                  in: query
                  type: string
                  required: false
                  description: "Filter by league"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-player
              method: GET
              description: "Get a specific player by ID"
              inputParameters:
                - name: playerId
                  in: path
                  type: string
                  required: true
                  description: "Unique player identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: sports
          path: /sports/
          description: "Supported sports catalog"
          operations:
            - name: list-sports
              method: GET
              description: "List all supported sports"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: leagues
          path: /leagues/
          description: "Supported leagues catalog"
          operations:
            - name: list-leagues
              method: GET
              description: "List all supported leagues with optional sport filter"
              inputParameters:
                - name: sport
                  in: query
                  type: string
                  required: false
                  description: "Filter leagues by sport"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: markets
          path: /markets/
          description: "Supported betting market types"
          operations:
            - name: list-markets
              method: GET
              description: "List all supported betting markets including moneylines, spreads, totals, and props"
              inputParameters:
                - name: sport
                  in: query
                  type: string
                  required: false
                  description: "Filter markets by sport"
                - name: betType
                  in: query
                  type: string
                  required: false
                  description: "Filter by bet type (moneyline, spread, total, prop)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: stats
          path: /stats/
          description: "Game and player statistical data"
          operations:
            - name: list-stats
              method: GET
              description: "Retrieve statistical data for events"
              inputParameters:
                - name: eventId
                  in: query
                  type: string
                  required: false
                  description: "Filter by event ID"
                - name: sport
                  in: query
                  type: string
                  required: false
                  description: "Filter by sport"
                - name: league
                  in: query
                  type: string
                  required: false
                  description: "Filter by league"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: account
          path: /account/usage/
          description: "API account usage and rate limit information"
          operations:
            - name: get-usage
              method: GET
              description: "Get current API usage metrics and rate limit status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: sportsgameodds-api
      resources:
        - path: /v1/events
          name: events
          description: "Sporting events with odds"
          operations:
            - method: GET
              name: list-events
              description: "List sporting events with optional filters"
              call: "sportsgameodds.list-events"
              with:
                sport: "rest.sport"
                league: "rest.league"
                status: "rest.status"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/events/{eventId}
          name: event
          description: "Single event with odds"
          operations:
            - method: GET
              name: get-event
              description: "Get event by ID"
              call: "sportsgameodds.get-event"
              with:
                eventId: "rest.eventId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/teams
          name: teams
          description: "Sports teams"
          operations:
            - method: GET
              name: list-teams
              description: "List teams"
              call: "sportsgameodds.list-teams"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/players
          name: players
          description: "Sports players"
          operations:
            - method: GET
              name: list-players
              description: "List players"
              call: "sportsgameodds.list-players"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/markets
          name: markets
          description: "Betting market types"
          operations:
            - method: GET
              name: list-markets
              description: "List betting markets"
              call: "sportsgameodds.list-markets"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: sportsgameodds-mcp
      transport: http
      tools:
        - name: list-events
          description: "List sporting events with optional filters for sport, league, and status"
          hints:
            readOnly: true
            openWorld: true
          call: "sportsgameodds.list-events"
          with:
            sport: "tools.sport"
            league: "tools.league"
            status: "tools.status"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-event
          description: "Get a specific sporting event with live odds from all sportsbooks"
          hints:
            readOnly: true
            openWorld: true
          call: "sportsgameodds.get-event"
          with:
            eventId: "tools.eventId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-teams
          description: "List sports teams by sport or league"
          hints:
            readOnly: true
            openWorld: true
          call: "sportsgameodds.list-teams"
          with:
            sport: "tools.sport"
            league: "tools.league"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-players
          description: "List athletes by team, sport, or league for player prop research"
          hints:
            readOnly: true
            openWorld: true
          call: "sportsgameodds.list-players"
          with:
            teamId: "tools.teamId"
            sport: "tools.sport"
            league: "tools.league"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-markets
          description: "List available betting market types (moneylines, spreads, totals, props)"
          hints:
            readOnly: true
            openWorld: true
          call: "sportsgameodds.list-markets"
          with:
            sport: "tools.sport"
            betType: "tools.betType"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-sports
          description: "List all sports covered by SportsGameOdds"
          hints:
            readOnly: true
            openWorld: true
          call: "sportsgameodds.list-sports"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-leagues
          description: "List all leagues covered (NFL, NBA, MLB, NHL, EPL, etc.)"
          hints:
            readOnly: true
            openWorld: true
          call: "sportsgameodds.list-leagues"
          with:
            sport: "tools.sport"
          outputParameters:
            - type: object
              mapping: "$."
