naftiko: 1.0.0-alpha2
info:
  label: SportsGameOdds API — Players
  description: 'SportsGameOdds API — Players. 2 operations. Lead operation: List Players. Self-contained Naftiko capability
    covering one Sportsgameodds business surface.'
  tags:
  - Sportsgameodds
  - Players
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPORTSGAMEODDS_API_KEY: SPORTSGAMEODDS_API_KEY
capability:
  consumes:
  - type: http
    namespace: sportsgameodds-players
    baseUri: https://api.sportsgameodds.com/v1
    description: SportsGameOdds API — Players business capability. Self-contained, no shared references.
    resources:
    - name: players
      path: /players/
      operations:
      - name: listplayers
        method: GET
        description: List Players
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: teamId
          in: query
          type: string
          description: Filter by team ID
        - name: sport
          in: query
          type: string
          description: Filter by sport
        - name: league
          in: query
          type: string
          description: Filter by league
    - name: players-playerId
      path: /players/{playerId}
      operations:
      - name: getplayer
        method: GET
        description: Get Player
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: playerId
          in: path
          type: string
          description: Unique player identifier
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.SPORTSGAMEODDS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: sportsgameodds-players-rest
    port: 8080
    description: REST adapter for SportsGameOdds API — Players. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/players
      name: players
      description: REST surface for players.
      operations:
      - method: GET
        name: listplayers
        description: List Players
        call: sportsgameodds-players.listplayers
        with:
          teamId: rest.teamId
          sport: rest.sport
          league: rest.league
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/players/{playerid}
      name: players-playerid
      description: REST surface for players-playerId.
      operations:
      - method: GET
        name: getplayer
        description: Get Player
        call: sportsgameodds-players.getplayer
        with:
          playerId: rest.playerId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sportsgameodds-players-mcp
    port: 9090
    transport: http
    description: MCP adapter for SportsGameOdds API — Players. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-players
      description: List Players
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sportsgameodds-players.listplayers
      with:
        teamId: tools.teamId
        sport: tools.sport
        league: tools.league
      outputParameters:
      - type: object
        mapping: $.
    - name: get-player
      description: Get Player
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sportsgameodds-players.getplayer
      with:
        playerId: tools.playerId
      outputParameters:
      - type: object
        mapping: $.
