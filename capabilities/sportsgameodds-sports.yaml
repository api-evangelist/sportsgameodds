naftiko: 1.0.0-alpha2
info:
  label: SportsGameOdds API — Sports
  description: 'SportsGameOdds API — Sports. 1 operations. Lead operation: List Sports. Self-contained Naftiko capability
    covering one Sportsgameodds business surface.'
  tags:
  - Sportsgameodds
  - Sports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPORTSGAMEODDS_API_KEY: SPORTSGAMEODDS_API_KEY
capability:
  consumes:
  - type: http
    namespace: sportsgameodds-sports
    baseUri: https://api.sportsgameodds.com/v1
    description: SportsGameOdds API — Sports business capability. Self-contained, no shared references.
    resources:
    - name: sports
      path: /sports/
      operations:
      - name: listsports
        method: GET
        description: List Sports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.SPORTSGAMEODDS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: sportsgameodds-sports-rest
    port: 8080
    description: REST adapter for SportsGameOdds API — Sports. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sports
      name: sports
      description: REST surface for sports.
      operations:
      - method: GET
        name: listsports
        description: List Sports
        call: sportsgameodds-sports.listsports
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sportsgameodds-sports-mcp
    port: 9090
    transport: http
    description: MCP adapter for SportsGameOdds API — Sports. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-sports
      description: List Sports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sportsgameodds-sports.listsports
      outputParameters:
      - type: object
        mapping: $.
